# configs/logging.yaml
version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)-8s] %(name)s — %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  detailed:
    format: "%(asctime)s [%(levelname)-8s] %(name)s:%(lineno)d — %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class:      logging.StreamHandler
    level:      INFO
    formatter:  standard
    stream:     ext://sys.stdout

  file_info:
    class:          logging.handlers.RotatingFileHandler
    level:          INFO
    formatter:      detailed
    filename:       logs/diarizer.log
    maxBytes:       10485760
    backupCount:    5
    encoding:       utf8

  file_errors:
    class:          logging.handlers.RotatingFileHandler
    level:          ERROR
    formatter:      detailed
    filename:       logs/errors.log
    maxBytes:       10485760
    backupCount:    5
    encoding:       utf8

loggers:
  diarizer:
    level:    DEBUG
    handlers: [console, file_info, file_errors]
    propagate: false

  diarizer.api:
    level:    INFO
    handlers: [console, file_info]
    propagate: false

  uvicorn:
    level:    INFO
    handlers: [console, file_info]
    propagate: false

root:
  level:    WARNING
  handlers: [console, file_errors]